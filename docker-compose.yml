version: "3.9"

# ==========================================
# AI駆動型ナレッジ検索 文書作成支援ツール
# docker-compose.yml
# ==========================================
# 起動: docker compose up -d
# 停止: docker compose down
# ログ: docker compose logs -f

networks:
  ai-knowledge-net:
    driver: bridge

volumes:
  ollama_data:       # Ollamaモデルの永続化
  sqlite_data:       # SQLite DBの永続化
  vector_store_data: # ベクトルストアの永続化
  open_notebook_data:
  sources_data:      # アップロードされたソースファイルの永続化
  output_files_data: # チャット履歴から生成された出力ファイル(Excel/Word/PPT)の永続化

services:

  # ============================================
  # Ollama - ローカルLLM実行基盤
  # Gemma3:12b モデルを動かす
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: ai-knowledge-ollama
    ports:
      - "3107:11434"  # ポート台帳: 051_AI文書検索作成Proj (3100-3109)
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-knowledge-net
    restart: unless-stopped
    # GPUを使用する場合は下記のコメントを解除
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # Ollama モデル Pull 用の初期化コンテナ
  # 初回起動時にGemma3:12bを自動Pull
  # ============================================
  ollama-init:
    image: ollama/ollama:latest
    container_name: ai-knowledge-ollama-init
    networks:
      - ai-knowledge-net
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo '🤖 qwen2.5-coder:1.5b モデルをPull中... (数GB、初回のみ時間がかかります)';
        ollama pull qwen2.5-coder:1.5b;
        echo '✅ qwen2.5-coder:1.5b Pull完了';
      "
    restart: no

  # ============================================
  # Open Notebook - RAGエンジン・UI (将来統合用・現在未使用)
  # SurrealDB未設定のため、本改修では起動させません。
  # ============================================
  open-notebook:
    image: lfnovo/open_notebook:latest
    container_name: ai-knowledge-open-notebook
    profiles:
      - open-notebook
    ports:
      - "3104:5000"  # ポート台帳: 051_AI文書検索作成Proj (3100-3109)
    volumes:
      - open_notebook_data:/app/data
      - ./watch:/watch:ro  # 監視対象フォルダ（読み取り専用でマウント）
    networks:
      - ai-knowledge-net
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
    depends_on:
      - ollama
    restart: "no"

  # ============================================
  # FastAPI バックエンド
  # RAG・文書生成・音声認識のAPI
  # ============================================
  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    container_name: ai-knowledge-api
    ports:
      - "3101:8000"  # ポート台帳: 051_AI文書検索作成Proj (3100-3109)
    volumes:
      - ./app/api:/app
      - ./templates:/templates:ro
      - ./watch:/watch:ro
      - ./step2:/app/step2
      - ./tests:/app/tests
      # 自動検索(watch-paths)対象フォルダ。新規追加時は /mnt/watch_roots/<フォルダ名> の規約で追記する
      - ./test-business-docs:/mnt/watch_roots/test-business-docs:ro
      - sqlite_data:/data/sqlite
      - vector_store_data:/data/vector_store
      - sources_data:/data/sources
      - output_files_data:/data/output_files
    networks:
      - ai-knowledge-net
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:4b}
      - SQLITE_DB_PATH=/data/sqlite/knowledge.db
      - VECTOR_STORE_PATH=/data/vector_store
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      - RAG_BACKEND=${RAG_BACKEND:-vector}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - BRAVE_SEARCH_ENABLED=${BRAVE_SEARCH_ENABLED:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Next.js フロントエンド
  # ============================================
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: ai-knowledge-frontend
    ports:
      - "3102:3000"  # ポート台帳: 051_AI文書検索作成Proj (3100-3109)
    networks:
      - ai-knowledge-net
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3101
    depends_on:
      - api
    restart: unless-stopped

  # ============================================
  # ファイル監視クローラー
  # PC内ファイルの変更を検知して自動インデクシング
  # ============================================
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: ai-knowledge-crawler
    volumes:
      - ./crawler:/app
      - ./watch:/watch:ro
      - sqlite_data:/data/sqlite
      - vector_store_data:/data/vector_store
    networks:
      - ai-knowledge-net
    environment:
      - WATCH_FOLDERS=/watch
      - SQLITE_DB_PATH=/data/sqlite/knowledge.db
      - API_URL=http://api:8000
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-300}
    depends_on:
      - api
    restart: unless-stopped
