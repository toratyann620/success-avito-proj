version: "3.9"

# ==========================================
# AI駆動型ナレッジ検索 文書作成支援ツール
# docker-compose.yml
# ==========================================
# 起動: docker compose up -d
# 停止: docker compose down
# ログ: docker compose logs -f

networks:
  ai-knowledge-net:
    driver: bridge

volumes:
  ollama_data:       # Ollamaモデルの永続化
  sqlite_data:       # SQLite DBの永続化
  vector_store_data: # ベクトルストアの永続化
  open_notebook_data:

services:

  # ============================================
  # Ollama - ローカルLLM実行基盤
  # Gemma3:12b モデルを動かす
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: ai-knowledge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-knowledge-net
    restart: unless-stopped
    # GPUを使用する場合は下記のコメントを解除
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # Ollama モデル Pull 用の初期化コンテナ
  # 初回起動時にGemma3:12bを自動Pull
  # ============================================
  ollama-init:
    image: ollama/ollama:latest
    container_name: ai-knowledge-ollama-init
    networks:
      - ai-knowledge-net
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo '🤖 Gemma3:12b モデルをPull中... (数GB、初回のみ時間がかかります)';
        ollama pull gemma3:12b;
        echo '✅ Gemma3:12b Pull完了';
      "
    restart: no

  # ============================================
  # Open Notebook - RAGエンジン・UI
  # ============================================
  open-notebook:
    image: lfnovo/open-notebook:latest
    container_name: ai-knowledge-open-notebook
    ports:
      - "5000:5000"
    volumes:
      - open_notebook_data:/app/data
      - ./watch:/watch:ro  # 監視対象フォルダ（読み取り専用でマウント）
    networks:
      - ai-knowledge-net
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  # ============================================
  # FastAPI バックエンド
  # RAG・文書生成・音声認識のAPI
  # ============================================
  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    container_name: ai-knowledge-api
    ports:
      - "8000:8000"
    volumes:
      - ./app/api:/app
      - ./templates:/templates:ro
      - ./watch:/watch:ro
      - sqlite_data:/data/sqlite
      - vector_store_data:/data/vector_store
    networks:
      - ai-knowledge-net
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:12b}
      - SQLITE_DB_PATH=/data/sqlite/knowledge.db
      - VECTOR_STORE_PATH=/data/vector_store
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - BRAVE_SEARCH_ENABLED=${BRAVE_SEARCH_ENABLED:-false}
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Next.js フロントエンド
  # ============================================
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: ai-knowledge-frontend
    ports:
      - "3000:3000"
    networks:
      - ai-knowledge-net
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  # ============================================
  # ファイル監視クローラー
  # PC内ファイルの変更を検知して自動インデクシング
  # ============================================
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: ai-knowledge-crawler
    volumes:
      - ./crawler:/app
      - ./watch:/watch:ro
      - sqlite_data:/data/sqlite
      - vector_store_data:/data/vector_store
    networks:
      - ai-knowledge-net
    environment:
      - WATCH_FOLDERS=/watch
      - SQLITE_DB_PATH=/data/sqlite/knowledge.db
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
